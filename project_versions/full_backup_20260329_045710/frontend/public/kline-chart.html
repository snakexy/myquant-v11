        // 切换周期（v3.2：使用initial stage）
        async function changePeriod(newPeriod) {
            if (newPeriod === CONFIG.period) {
                console.log('当前已经是该周期');
                return;
            }

            console.log(`🔄 切换周期: ${CONFIG.period} -> ${newPeriod}`);

            // 更新按钮状态
            const buttons = document.querySelectorAll('.period-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(getPeriodDisplayName(newPeriod))) {
                    btn.classList.add('active');
                }
            });

            // 更新配置
            CONFIG.period = newPeriod;

            // ⭐ v3.2.1：更新时间格式（自适应）
            updateTimeScaleOptions();

            // ⭐ v3.2.1修复：不要在这里清空数据，等数据加载成功后再清空
            // 这样可以防止数据加载失败时图表变空白
            // allData.candlestick = [];
            // allData.volume = [];
            // oldestDate = null;

            // ⭐ 保存当前激活的指标列表（切换周期后自动重新激活）
            const prevActiveIndicators = { ...activeIndicators };
            console.log('[周期切换] 已保存激活状态:', Object.keys(prevActiveIndicators).filter(k => prevActiveIndicators[k]));
            console.log('[周期切换] ⭐ 将自动重新激活这些指标');

            // 清空技术指标
            clearIndicators();

            // 【分时图特殊处理】
            if (newPeriod === '1m') {
                // 切换到分时图模式
                if (!isIntradayMode) {
                    // 移除K线系列，添加分时折线系列
                    chart.removeSeries(candlestickSeries);
                    chart.removeSeries(volumeSeries);

                    // 创建分时折线系列
                    intradaySeries = chart.addLineSeries({
                        color: '#2962ff',
                        lineWidth: 2,
                        priceLineVisible: false,
                        lastValueVisible: true,
                        title: '分时'
                    });

                    isIntradayMode = true;
                    console.log('✅ 已切换到分时图模式（折线图）');
                    console.log('📊 分时图显示当日每分钟收盘价走势');
                }

                // 加载当日分时数据（1分钟数据，240根约4小时交易时间）
                const periodConfig = KLINE_CONFIG[newPeriod] || KLINE_CONFIG['1d'];
                const initialCount = periodConfig.initial;  // 240
                console.log(`📊 加载分时图数据: ${initialCount}根（当日走势）`);

                // ⭐ v3.2：使用 initial stage → L3 完整数据（分时图需要全天数据）
                const initialData = await loadKlineData(CONFIG.symbol, initialCount, null, 'initial');
                if (initialData && initialData.length > 0) {
                    // 分时图只使用收盘价绘制折线
                    const intradayData = initialData.map(item => ({
                        time: item.time,
                        value: item.close  // 使用收盘价
                    }));

                    intradaySeries.setData(intradayData);
                    document.getElementById('dataInfo').textContent = `已加载: ${intradayData.length}根分时（当日走势）`;
                    chart.timeScale().fitContent();

                    // ⭐ 分时图不重新激活指标（分时图通常不显示技术指标）
                    console.log('✅ 已切换到分时图（技术指标已禁用）');
                }
                return;
            }

            // 【K线图模式】
            if (isIntradayMode) {
                // 从分时图切换回K线图
                try {
                    chart.removeSeries(intradaySeries);
                } catch (e) {
                    console.warn('[切换周期] 移除分时series失败:', e);
                }

                // ⭐ 先清理所有技术指标（避免旧series干扰）
                try {
                    Object.keys(indicators).forEach(indicatorName => {
                        if (indicators[indicatorName]) {
                            clearIndicator(indicatorName);
                        }
                    });
                } catch (e) {
                    console.warn('[切换周期] 清理指标失败:', e);
                }

                // 重新创建K线和成交量系列
                try {
                    candlestickSeries = chart.addCandlestickSeries({
                        upColor: '#ef5350',
                        downColor: '#26a69a',
                        borderVisible: false,
                        wickUpColor: '#ef5350',
                        wickDownColor: '#26a69a',
                    });

                    volumeSeries = chart.addHistogramSeries({
                        color: '#26a69a',
                        priceFormat: {
                            type: 'volume',
                        },
                        priceScaleId: '',
                    });

                    volumeSeries.priceScale().applyOptions({
                        scaleMargins: {
                            top: 0.8,
                            bottom: 0,
                        },
                    });

                    isIntradayMode = false;
                    console.log('✅ 已切换到K线图模式（蜡烛图）');
                } catch (e) {
                    console.error('[切换周期] 创建K线series失败:', e);
                    throw e;
                }
            }

            // 根据KLINE_CONFIG确定初始加载量
            const periodConfig = KLINE_CONFIG[newPeriod] || KLINE_CONFIG['1d'];
            const initialCount = periodConfig.initial;

            console.log(`📊 加载${newPeriod}周期数据: ${initialCount}根`);

            // ⭐ v3.2：使用 initial stage → L1/L2 快速显示
            const initialData = await loadKlineData(CONFIG.symbol, initialCount, null, 'initial');
            if (initialData && initialData.length > 0) {
                updateChartData(initialData);
                chart.timeScale().fitContent();

                // ⭐ 自动重新激活之前显示的指标（MA问题已修复）
                const reactivateIndicators = () => {
                    console.log('[周期切换] 开始重新激活指标:', Object.keys(prevActiveIndicators).filter(k => prevActiveIndicators[k]));

                    Object.keys(prevActiveIndicators).forEach(indicatorName => {
                        if (prevActiveIndicators[indicatorName]) {
                            try {
                                console.log(`[周期切换] 重新激活 ${indicatorName}`);
                                showIndicator(indicatorName);
                                activeIndicators[indicatorName] = true;
                                const btn = document.getElementById('btn' + indicatorName);
                                if (btn) {
                                    btn.classList.add('active');
                                }
                            } catch (error) {
                                console.error(`[周期切换] 重新激活${indicatorName}失败:`, error);
                                // 失败时标记为未激活，但不影响其他指标
                                activeIndicators[indicatorName] = false;
                            }
                        }
                    });
                    console.log(`✅ 周期切换完成，已重新激活技术指标`);
                };

                // 等待3帧（约50ms）确保chart完全渲染
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(reactivateIndicators);
                    });
                });
            } else {
                // ⭐ v3.2.1修复：不阻止切换，只是提示用户
                console.warn(`⚠️ ${newPeriod}周期暂无数据（可能为非交易时段或数据源限制）`);
                document.getElementById('dataInfo').textContent = `暂无数据（${newPeriod}）`;
                // 保持当前周期，不恢复
            }
        }

        // 获取周期显示名称
        function getPeriodDisplayName(period) {
            const names = {
                '1m': '分时',
                '5m': '5分',
                '15m': '15分',
                '30m': '30分',
                '60m': '60分',
                '1d': '日线',
                '1w': '周线',
                '1mon': '月线'
            };
            return names[period] || period;
        }

        // 重置视图
        function resetView() {
            chart.timeScale().fitContent();
        }

        // 更新状态显示
        function updateStatus(status) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + status;

            const statusText = {
                'loading': '正在加载...',
                'success': 'API已连接',
                'error': '连接失败'
            };
            statusEl.textContent = statusText[status] || status;
        }

        // 初始化（v3.2：三层加载机制）
        async function init() {
            console.log('🚀 开始初始化...');

            initChart();

            // 检查API连接
            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/api/v1/market/kline/health`);
                if (response.ok) {
                    const health = await response.json();
                    console.log('✅ API健康检查:', health);
                    updateStatus('success');

                    // ⭐ v3.2三层加载机制
                    const periodConfig = KLINE_CONFIG[CONFIG.period] || KLINE_CONFIG['1d'];

                    // 【第一层】立即显示（100根L3 + 1根L1）
                    console.log('📊 === 第一层：立即显示 ===');

                    // 1. 加载历史数据（L3，100根）
                    const historicalData = await loadKlineData(
                        CONFIG.symbol,
                        100,  // 固定100根历史数据
                        null,
                        'initial'
                    );

                    if (historicalData) {
                        updateChartData(historicalData);

                        // 2. 加载今日实时数据（L1，1根）
                        const realtimeData = await loadKlineData(
                            CONFIG.symbol,
                            1,
                            null,
                            'realtime'  // 使用L1级别，自动转换为K线格式
                        );

                        if (realtimeData && realtimeData.length > 0) {
                            // 验证实时数据
                            const validRealtimeData = realtimeData.filter(item => {
                                return item &&
                                       item.time !== null && item.time !== undefined &&
                                       item.open !== null && item.open !== undefined && !isNaN(item.open) &&
                                       item.high !== null && item.high !== undefined && !isNaN(item.high) &&
                                       item.low !== null && item.low !== undefined && !isNaN(item.low) &&
                                       item.close !== null && item.close !== undefined && !isNaN(item.close) &&
                                       item.volume !== null && item.volume !== undefined && !isNaN(item.volume);
                            });

                            if (validRealtimeData.length > 0) {
                                // 合并数据（历史 + 今日实时）
                                const mergedData = [...historicalData, ...validRealtimeData];
                                updateChartData(mergedData);
                                chart.timeScale().fitContent();
                                console.log(`✅ 第一层完成：${mergedData.length}根K线已显示（历史${historicalData.length}根 + 实时${validRealtimeData.length}根）`);
                            } else {
                                console.log('⚠️ 实时数据全部无效，仅显示历史数据');
                                updateChartData(historicalData);
                                chart.timeScale().fitContent();
                            }
                        } else {
                            // 如果没有实时数据（非交易时间），只显示历史数据
                            chart.timeScale().fitContent();
                            console.log(`✅ 第一层完成：${historicalData.length}根K线已显示（无实时数据）`);
                        }
                    }

                    // 【第二层】后台预加载（preload → L3，完整数据）
                    // 使用 setTimeout 让出主线程，确保UI先渲染
                    setTimeout(async () => {
                        console.log('💾 === 第二层：后台预加载完整数据 ===');
                        try {
                            // 基于第一层的最早日期继续向前加载，避免复权断层
                            if (allData.candlestick.length > 0) {
                                const earliestTimestamp = allData.candlestick[0].time;
                                const endDate = new Date(earliestTimestamp * 1000);
                                const endDateStr = endDate.toISOString().split('T')[0];

                                console.log(`📅 第二层将基于 ${endDateStr} 继续向前加载...`);

                                const historicalData = await loadKlineData(
                                    CONFIG.symbol,
                                    periodConfig.preload,
                                    endDateStr,
                                    'preload'  // ⭐ stage: preload
                                );

                                if (historicalData && historicalData.length > 0) {
                                    // 验证历史数据
                                    const validHistoricalData = historicalData.filter(item => {
                                        return item &&
                                               item.time !== null && item.time !== undefined &&
                                               item.open !== null && item.open !== undefined && !isNaN(item.open) &&
                                               item.high !== null && item.high !== undefined && !isNaN(item.high) &&
                                               item.low !== null && item.low !== undefined && !isNaN(item.low) &&
                                               item.close !== null && item.close !== undefined && !isNaN(item.close) &&
                                               item.volume !== null && item.volume !== undefined && !isNaN(item.volume);
                                    });

                                    if (validHistoricalData.length === 0) {
                                        console.log('⚠️ 第二层：加载的历史数据全部无效，跳过');
                                        return;
                                    }

                                    console.log(`✅ 第二层数据验证: ${validHistoricalData.length}/${historicalData.length}条有效`);

                                    // 合并数据：历史数据 + 当前数据
                                    const mergedData = [...validHistoricalData, ...allData.candlestick];

                                    // 更新图表
                                    updateChartData(mergedData);
                                    console.log(`✅ 第二层完成：后台已加载${mergedData.length}根K线到内存`);
                                    console.log('💾 现在缩放/拖动图表将无需等待，数据已在内存中');
                                } else {
                                    console.log('ℹ️ 第二层：没有更早的历史数据可加载');
                                }
                            } else {
                                console.log('⚠️ 第二层：第一层没有数据，跳过');
                            }
                        } catch (error) {
                            console.warn('⚠️ 后台预加载失败，不影响当前显示:', error);
                        }
                    }, 100);

                    // 【第三层】启动实时更新（realtime → L1，1ms最快速度）
                    console.log('🔄 === 第三层：启动实时更新 ===');
                    startRealtimeUpdate();

                } else {
                    throw new Error('API健康检查失败');
                }
            } catch (error) {
                console.error('❌ API连接失败:', error);
                updateStatus('error');
                document.getElementById('status').innerHTML =
                    'API未连接 - 请启动后端服务:<br>python start_kline_server.py';
            }

            // ⭐ 恢复保存的激活指标状态
            setTimeout(() => {
                restoreActiveIndicators();
            }, 500);

            // ⭐ 加载自定义指标列表
            loadCustomIndicators();

            console.log('✅ 初始化完成');
        }

        /**
         * 恢复之前保存的激活指标
         */
        function restoreActiveIndicators() {
            if (typeof configManager === 'undefined') {
                console.log('[恢复状态] configManager未定义，跳过恢复');
                return;
            }

            const savedActiveIndicators = configManager.getActiveIndicators();
            const indicatorNames = Object.keys(savedActiveIndicators);

            if (indicatorNames.length === 0) {
                console.log('[恢复状态] 没有保存的激活指标');
                return;
            }

            console.log(`[恢复状态] 准备恢复${indicatorNames.length}个激活指标:`, indicatorNames);

            indicatorNames.forEach(indicatorName => {
                if (savedActiveIndicators[indicatorName]) {
                    try {
                        console.log(`[恢复状态] 正在恢复 ${indicatorName}...`);
                        // ⭐ 先设置状态，再显示
                        activeIndicators[indicatorName] = true;
                        showIndicator(indicatorName);
                        const btn = document.getElementById('btn' + indicatorName);
                        if (btn) {
                            btn.classList.add('active');
                        }
                        console.log(`[恢复状态] ✅ ${indicatorName} 已恢复`);
                    } catch (error) {
                        console.error(`[恢复状态] ❌ ${indicatorName} 恢复失败:`, error);
                    }
                }
            });

            console.log('[恢复状态] 指标恢复完成');
        }

        /**
         * 保存当前激活的指标状态
         */
        function saveActiveIndicators() {
            if (typeof configManager !== 'undefined') {
                configManager.updateActiveIndicators(activeIndicators);
            }
        }

        // ⭐ 修改toggleIndicator函数，保存状态
        const originalToggleIndicator = toggleIndicator;
        toggleIndicator = function(indicatorName) {
            originalToggleIndicator(indicatorName);
            // 保存状态
            setTimeout(() => {
                saveActiveIndicators();
            }, 100);
        };

        // ⭐ 修改clearIndicators函数，清除保存的状态
        const originalClearIndicators = clearIndicators;
        clearIndicators = function() {
            originalClearIndicators();
            // 清除保存的状态（添加存在性检查）
            if (typeof configManager !== 'undefined') {
                configManager.updateActiveIndicators({});
            }
        };

        // ⭐ 创建专门的函数用于切换周期时清理指标（不保存状态）
        function clearIndicatorsForPeriodChange() {
            originalClearIndicators();
        }

        // ⭐ v3.2新增：检查是否在交易时间内
        function isTradingTime() {
            const now = new Date();
            const day = now.getDay();  // 0=周日, 6=周六

            // 周末不交易
            if (day === 0 || day === 6) {
                return false;
            }

            const hour = now.getHours();
            const minute = now.getMinutes();
            const currentTime = hour * 60 + minute;

            // 集合竞价：9:15-9:25 (555-565分钟)
            const callAuctionStart = 9 * 60 + 15;  // 555
            const callAuctionEnd = 9 * 60 + 25;    // 565

            // 上午交易时间：9:30-11:30 (570-690分钟)
            const morningStart = 9 * 60 + 30;  // 570
            const morningEnd = 11 * 60 + 30;   // 690

            // 下午交易时间：13:00-15:00 (780-900分钟)
            const afternoonStart = 13 * 60;    // 780
            const afternoonEnd = 15 * 60;      // 900

            // 检查是否在交易时间内（包含集合竞价）
            return (currentTime >= callAuctionStart && currentTime <= callAuctionEnd) ||
                   (currentTime >= morningStart && currentTime <= morningEnd) ||
                   (currentTime >= afternoonStart && currentTime <= afternoonEnd);
        }

        // ⭐ v3.2新增：实时更新功能（使用L1级别，最快速度）
        function startRealtimeUpdate() {
            // 清除旧的定时器
            if (window.realtimeTimer) {
                clearInterval(window.realtimeTimer);
            }

            // 每3秒更新一次
            window.realtimeTimer = setInterval(async () => {
                // 只在K线图模式下更新（分时图不需要实时更新）
                if (!isIntradayMode) {
                    // ⭐ v3.2新增：检查是否在交易时间内
                    if (!isTradingTime()) {
                        // 非交易时间跳过更新（不打印日志，避免刷屏）
                        return;
                    }

                    try {
                        const data = await loadKlineData(
                            CONFIG.symbol,
                            1,  // 只获取最新1根K线
                            null,
                            'realtime'  // ⭐ stage: realtime
                        );

                        if (data && data.length > 0) {
                            const latestBar = data[0];
                            // ⭐ 检查candlestickSeries是否存在（可能在切换周期时被销毁）
                            if (candlestickSeries && typeof candlestickSeries.updateData === 'function') {
                                updateLatestBar(latestBar);
                            } else {
                                console.warn('⚠️ candlestickSeries不存在，跳过本次更新');
                            }
                        }
                    } catch (error) {
                        console.warn('⚠️ 实时更新失败（将在下次重试）:', error);
                    }
                }
            }, 3000);  // 每3秒更新一次

            const tradingStatus = isTradingTime() ? '交易时间内' : '非交易时间';
            console.log(`✅ 实时更新已启动（每3秒更新最新K线，使用L1级别，仅在${tradingStatus}更新）`);
        }

        // ⭐ v3.2新增：更新最后一根K线
        function updateLatestBar(latestBar) {
            // ⭐ 数据验证：过滤null值
            if (!latestBar ||
                latestBar.time === null || latestBar.time === undefined ||
                latestBar.open === null || latestBar.open === undefined || isNaN(latestBar.open) ||
                latestBar.high === null || latestBar.high === undefined || isNaN(latestBar.high) ||
                latestBar.low === null || latestBar.low === undefined || isNaN(latestBar.low) ||
                latestBar.close === null || latestBar.close === undefined || isNaN(latestBar.close) ||
                latestBar.volume === null || latestBar.volume === undefined || isNaN(latestBar.volume)) {
                console.warn('⚠️ 最新K线数据无效，跳过更新');
                return;
            }

            // ⭐ 检查candlestickSeries和volumeSeries是否存在
            if (!candlestickSeries || !volumeSeries) {
                console.warn('⚠️ 图表series不存在，无法更新K线');
                return;
            }

            if (allData.candlestick.length === 0) {
                console.warn('⚠️ 没有现有数据，无法更新K线');
                return;
            }

            const lastBar = allData.candlestick[allData.candlestick.length - 1];

            if (latestBar.time === lastBar.time) {
                // 更新最后一根（时间相同，更新数据）
                allData.candlestick[allData.candlestick.length - 1] = latestBar;

                // 更新成交量
                if (allData.volume.length > 0) {
                    allData.volume[allData.volume.length - 1] = {
                        time: latestBar.time,
                        value: latestBar.volume,
                        color: latestBar.close >= latestBar.open ? '#ef535080' : '#26a69a80'
                    };
                }

                // ⭐ 检查updateData方法是否存在
                if (typeof candlestickSeries.updateData === 'function') {
                    candlestickSeries.updateData(latestBar);
                }
                if (typeof volumeSeries.updateData === 'function') {
                    volumeSeries.updateData(allData.volume[allData.volume.length - 1]);
                }

                console.log('🔄 已更新最新K线');
            } else {
                // 新增一根（时间不同，添加新K线）
                allData.candlestick.push(latestBar);
                allData.volume.push({
                    time: latestBar.time,
                    value: latestBar.volume,
                    color: latestBar.close >= latestBar.open ? '#ef535080' : '#26a69a80'
                });

                // ⭐ 检查updateData方法是否存在
                if (typeof candlestickSeries.updateData === 'function') {
                    candlestickSeries.updateData(latestBar);
                }
                if (typeof volumeSeries.updateData === 'function') {
                    volumeSeries.updateData(allData.volume[allData.volume.length - 1]);
                }

                console.log('➕ 已新增最新K线');
            }

            // 更新数据计数显示
            document.getElementById('dataInfo').textContent = `已加载: ${allData.candlestick.length}根K线`;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
