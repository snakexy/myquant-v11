<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电路板架构系统演示</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        .demo-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .demo-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 2px solid #0f3460;
            padding: 15px;
            text-align: center;
        }
        
        .demo-title {
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .demo-description {
            color: #e0e0e0;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .demo-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .circuit-board-preview {
            width: 100%;
            height: 100%;
            position: relative;
            background: #0a0a0f;
        }
        
        .preview-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .preview-nodes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .preview-node {
            position: absolute;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #0f3460;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            min-width: 120px;
            min-height: 80px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        
        .preview-node:hover {
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: scale(1.05) translateY(-2px);
        }
        
        .preview-node.active {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border-color: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 35px rgba(0, 255, 136, 0.6);
            animation: nodeActivePulse 2s infinite;
        }
        
        .preview-node-icon {
            font-size: 20px;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 5px;
        }
        
        .preview-node.active .preview-node-icon {
            color: #0a0a0f;
            text-shadow: 0 0 15px rgba(10, 10, 15, 0.8);
        }
        
        .preview-node-label {
            font-size: 10px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .preview-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .preview-controls h3 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .control-button {
            width: 100%;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .control-button:hover {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0a0a0f;
            border-color: #00ff88;
        }
        
        .control-button:last-child {
            margin-bottom: 0;
        }
        
        .demo-footer {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            border-top: 2px solid #0f3460;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        
        .status-info {
            display: flex;
            gap: 20px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #e0e0e0;
        }
        
        .status-item i {
            color: #00ff88;
        }
        
        @keyframes nodeActivePulse {
            0%, 100% {
                box-shadow: 0 0 35px rgba(0, 255, 136, 0.6);
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 255, 136, 0.8);
            }
        }
        
        .layer-label {
            position: absolute;
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="demo-container">
            <div class="demo-header">
                <h1 class="demo-title">🔌 电路板架构系统演示</h1>
                <p class="demo-description">
                    巨大复杂的总体架构电路板可视化系统 - 功能驱动的自动节点激活演示
                </p>
            </div>
            
            <div class="demo-content">
                <div class="circuit-board-preview">
                    <canvas class="preview-canvas" ref="canvas"></canvas>
                    
                    <!-- 层级标签 -->
                    <div class="layer-label" style="top: 80px; left: 20px;">数据中枢层</div>
                    <div class="layer-label" style="top: 200px; left: 20px;">QLib核心层</div>
                    <div class="layer-label" style="top: 320px; left: 20px;">业务逻辑层</div>
                    <div class="layer-label" style="top: 440px; left: 20px;">AI策略层</div>
                    <div class="layer-label" style="top: 560px; left: 20px;">实盘交易层</div>
                    
                    <!-- 预览节点 -->
                    <div class="preview-nodes">
                        <div 
                            v-for="node in previewNodes" 
                            :key="node.id"
                            :class="['preview-node', { active: node.active }]"
                            :style="{
                                left: node.x + 'px',
                                top: node.y + 'px'
                            }"
                            @click="toggleNode(node)"
                        >
                            <div class="preview-node-icon">
                                <i :class="node.icon"></i>
                            </div>
                            <div class="preview-node-label">{{ node.name }}</div>
                        </div>
                    </div>
                    
                    <!-- 控制面板 -->
                    <div class="preview-controls">
                        <h3>🎮 演示控制</h3>
                        <button class="control-button" @click="activateWorkflow('ai-strategy')">
                            <i class="fas fa-brain"></i> 激活AI策略流程
                        </button>
                        <button class="control-button" @click="activateWorkflow('trading')">
                            <i class="fas fa-chart-line"></i> 激活交易流程
                        </button>
                        <button class="control-button" @click="activateWorkflow('model-training')">
                            <i class="fas fa-graduation-cap"></i> 激活模型训练
                        </button>
                        <button class="control-button" @click="deactivateAll">
                            <i class="fas fa-stop"></i> 全部停用
                        </button>
                        <button class="control-button" @click="randomActivate">
                            <i class="fas fa-random"></i> 随机激活
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="demo-footer">
                <div class="status-info">
                    <div class="status-item">
                        <i class="fas fa-microchip"></i>
                        总节点: {{ previewNodes.length }}
                    </div>
                    <div class="status-item">
                        <i class="fas fa-plug"></i>
                        激活节点: {{ activeNodes }}
                    </div>
                    <div class="status-item">
                        <i class="fas fa-bolt"></i>
                        系统负载: {{ systemLoad }}%
                    </div>
                </div>
                <div>
                    <span style="color: #00ff88;">⚡ MyQuant 电路板架构系统 v1.0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    previewNodes: [
                        // 数据中枢层
                        { id: 'DH1', name: '数据获取', icon: 'fas fa-database', x: 200, y: 50, active: false },
                        { id: 'DH2', name: '数据处理', icon: 'fas fa-cogs', x: 350, y: 50, active: false },
                        { id: 'DH3', name: '数据存储', icon: 'fas fa-hdd', x: 500, y: 50, active: false },
                        { id: 'DH4', name: '数据质量', icon: 'fas fa-check-circle', x: 650, y: 50, active: false },
                        
                        // QLib核心层
                        { id: 'QL1', name: 'QLib核心', icon: 'fas fa-cube', x: 200, y: 170, active: false },
                        { id: 'QL2', name: '数据接口', icon: 'fas fa-plug', x: 350, y: 170, active: false },
                        { id: 'QL3', name: '策略引擎', icon: 'fas fa-rocket', x: 500, y: 170, active: false },
                        { id: 'QL4', name: '回测系统', icon: 'fas fa-history', x: 650, y: 170, active: false },
                        
                        // 业务逻辑层
                        { id: 'BL1', name: '业务逻辑', icon: 'fas fa-sitemap', x: 200, y: 290, active: false },
                        { id: 'BL2', name: '数据分析', icon: 'fas fa-chart-bar', x: 350, y: 290, active: false },
                        { id: 'BL3', name: '风险管理', icon: 'fas fa-shield-alt', x: 500, y: 290, active: false },
                        { id: 'BL4', name: '报告生成', icon: 'fas fa-file-alt', x: 650, y: 290, active: false },
                        
                        // AI策略层
                        { id: 'AI1', name: 'AI引擎', icon: 'fas fa-brain', x: 200, y: 410, active: false },
                        { id: 'AI2', name: '机器学习', icon: 'fas fa-robot', x: 350, y: 410, active: false },
                        { id: 'AI3', name: '模型优化', icon: 'fas fa-sliders-h', x: 500, y: 410, active: false },
                        { id: 'AI4', name: '智能推荐', icon: 'fas fa-lightbulb', x: 650, y: 410, active: false },
                        
                        // 实盘交易层
                        { id: 'LT1', name: '交易执行', icon: 'fas fa-exchange-alt', x: 200, y: 530, active: false },
                        { id: 'LT2', name: '订单管理', icon: 'fas fa-clipboard-list', x: 350, y: 530, active: false },
                        { id: 'LT3', name: '风险控制', icon: 'fas fa-lock', x: 500, y: 530, active: false },
                        { id: 'LT4', name: '实时监控', icon: 'fas fa-eye', x: 650, y: 530, active: false }
                    ]
                };
            },
            computed: {
                activeNodes() {
                    return this.previewNodes.filter(n => n.active).length;
                },
                systemLoad() {
                    const total = this.previewNodes.length;
                    const active = this.activeNodes;
                    return total > 0 ? Math.round((active / total) * 100) : 0;
                }
            },
            mounted() {
                this.drawCircuitBoardBackground();
            },
            methods: {
                drawCircuitBoardBackground() {
                    const canvas = this.$refs.canvas;
                    if (!canvas) return;
                    
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                    
                    // 绘制网格背景
                    ctx.fillStyle = '#0a0a0f';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 主网格
                    ctx.strokeStyle = '#1a1a2e';
                    ctx.lineWidth = 0.5;
                    
                    const gridSize = 40;
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    
                    for (let y = 0; y < canvas.height; y += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    
                    // 细网格
                    ctx.strokeStyle = '#0f1419';
                    ctx.lineWidth = 0.3;
                    
                    const fineGridSize = 10;
                    for (let x = 0; x < canvas.width; x += fineGridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    
                    for (let y = 0; y < canvas.height; y += fineGridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    
                    // 绘制层级分隔线
                    ctx.strokeStyle = '#0f3460';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([10, 5]);
                    
                    const layerPositions = [120, 240, 360, 480, 600];
                    layerPositions.forEach(y => {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    });
                    
                    ctx.setLineDash([]);
                    
                    // 绘制装饰性连接点
                    for (let i = 0; i < 50; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        
                        ctx.fillStyle = '#1e2936';
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#0f3460';
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                },
                
                toggleNode(node) {
                    node.active = !node.active;
                },
                
                activateWorkflow(workflow) {
                    this.deactivateAll();
                    
                    const workflows = {
                        'ai-strategy': ['DH1', 'DH2', 'DH3', 'QL1', 'QL2', 'BL1', 'BL2', 'AI1', 'AI2', 'AI3', 'AI4'],
                        'trading': ['DH1', 'DH2', 'DH4', 'QL1', 'QL3', 'QL4', 'BL1', 'BL3', 'LT1', 'LT2', 'LT3', 'LT4'],
                        'model-training': ['DH1', 'DH2', 'DH3', 'QL1', 'QL2', 'BL1', 'BL2', 'AI1', 'AI2', 'AI3']
                    };
                    
                    const nodesToActivate = workflows[workflow] || [];
                    
                    // 逐个激活节点，创建动画效果
                    nodesToActivate.forEach((nodeId, index) => {
                        setTimeout(() => {
                            const node = this.previewNodes.find(n => n.id === nodeId);
                            if (node) {
                                node.active = true;
                            }
                        }, index * 200);
                    });
                },
                
                deactivateAll() {
                    this.previewNodes.forEach(node => {
                        node.active = false;
                    });
                },
                
                randomActivate() {
                    this.deactivateAll();
                    const numToActivate = Math.floor(Math.random() * 10) + 5;
                    const shuffled = [...this.previewNodes].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, numToActivate);
                    
                    selected.forEach((node, index) => {
                        setTimeout(() => {
                            node.active = true;
                        }, index * 150);
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
