<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="45" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- 主要图形 - 代表量化的图表/数据 -->
  <rect x="20" y="30" width="8" height="40" fill="url(#logoGradient)" rx="2"/>
  <rect x="32" y="25" width="8" height="45" fill="url(#logoGradient)" rx="2"/>
  <rect x="44" y="20" width="8" height="50" fill="url(#logoGradient)" rx="2"/>
  <rect x="56" y="35" width="8" height="35" fill="url(#logoGradient)" rx="2"/>
  <rect x="68" y="28" width="8" height="42" fill="url(#logoGradient)" rx="2"/>
  
  <!-- 装饰性元素 - 代表AI/智能 -->
  <circle cx="24" cy="25" r="3" fill="#10b981"/>
  <circle cx="36" cy="20" r="3" fill="#10b981"/>
  <circle cx="48" cy="15" r="3" fill="#10b981"/>
  <circle cx="60" cy="30" r="3" fill="#10b981"/>
  <circle cx="72" cy="23" r="3" fill="#10b981"/>
  
  <!-- 连接线 -->
  <path d="M24,25 L36,20 L48,15 L60,30 L72,23" stroke="#10b981" stroke-width="1" fill="none" opacity="0.6"/>
</svg>