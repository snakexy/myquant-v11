<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试页面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0f;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #667eea;
            margin-top: 0;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav a {
            color: #667eea;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #667eea;
            border-radius: 4px;
        }
        .nav a:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>简单测试页面</h1>
        <p>如果你能看到这个页面，说明基本的HTML和CSS工作正常</p>
        
        <div class="nav">
            <a href="/">首页</a>
            <a href="/test">测试页面</a>
            <a href="/intelligent-node-system">智能节点系统</a>
        </div>
        
        <div class="card">
            <h2>测试卡片 1</h2>
            <p>这是一个测试卡片，用于验证基本样式是否正常显示。</p>
        </div>
        
        <div class="card">
            <h2>测试卡片 2</h2>
            <p>这是另一个测试卡片，用于验证布局是否正常。</p>
        </div>
        
        <div class="card">
            <h2>系统信息</h2>
            <p>当前时间: <span id="current-time"></span></p>
            <p>用户代理: <span id="user-agent"></span></p>
        </div>
    </div>
    
    <script>
        // 显示当前时间
        document.getElementById('current-time').textContent = new Date().toLocaleString();
        
        // 显示用户代理
        document.getElementById('user-agent').textContent = navigator.userAgent;
        
        // 检查Vue应用是否加载
        console.log('简单测试页面加载完成');
        
        // 尝试检测Vue应用
        setTimeout(() => {
            const app = document.getElementById('app');
            if (app) {
                console.log('找到Vue应用容器:', app);
                console.log('容器内容:', app.innerHTML.substring(0, 200) + '...');
            } else {
                console.log('未找到Vue应用容器');
            }
        }, 1000);
    </script>
</body>
</html>
