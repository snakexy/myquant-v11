<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简洁图标总体架构电路板系统演示</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        .demo-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .demo-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 2px solid #0f3460;
            padding: 10px;
            text-align: center;
        }
        
        .demo-title {
            color: #00ff88;
            font-size: 20px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .demo-content {
            flex: 1;
            position: relative;
            overflow: auto;
        }
        
        .circuit-board-full {
            width: 1600px;
            height: 1200px;
            position: relative;
            background: #0a0a0f;
            margin: 0 auto;
        }
        
        .full-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .connections-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .full-nodes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .full-node {
            position: absolute;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #0f3460;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            min-width: 80px;
            min-height: 60px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            font-size: 10px;
            opacity: 0.9;
        }
        
        .full-node:hover {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: scale(1.1);
            z-index: 20;
            opacity: 1;
        }
        
        .full-node.active {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border-color: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
            animation: nodeActivePulse 2s infinite;
            opacity: 1;
        }
        
        .full-node-icon {
            font-size: 16px;
            margin-bottom: 3px;
            transition: all 0.3s ease;
            opacity: 0.7;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
            font-size: 12px;
            color: #e0e0e0;
        }
        
        .full-node.active .full-node-icon {
            opacity: 1;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #0a0a0f;
        }
        
        .full-node-label {
            font-size: 8px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }
        
        .full-node.active .full-node-label {
            opacity: 1;
        }
        
        .preview-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .preview-controls h3 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .control-button {
            width: 100%;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .control-button:hover {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0a0a0f;
            border-color: #00ff88;
        }
        
        .control-button:last-child {
            margin-bottom: 0;
        }
        
        .demo-footer {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            border-top: 2px solid #0f3460;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        
        .status-info {
            display: flex;
            gap: 20px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #e0e0e0;
        }
        
        .status-item i {
            color: #00ff88;
        }
        
        .layer-label {
            position: absolute;
            color: #00ff88;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            z-index: 5;
        }
        
        @keyframes nodeActivePulse {
            0%, 100% {
                box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
            }
            50% {
                box-shadow: 0 0 35px rgba(0, 255, 136, 0.8);
            }
        }
        
        .connection-line {
            stroke: #333366;
            stroke-width: 1.5;
            fill: none;
            opacity: 0.4;
            transition: all 0.3s ease;
        }
        
        .connection-line.active {
            stroke: #00ff88;
            stroke-width: 2.5;
            opacity: 1;
            filter: drop-shadow(0 0 3px #00ff88);
            animation: connectionPulse 2s infinite;
        }
        
        @keyframes connectionPulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="demo-container">
            <div class="demo-header">
                <h1 class="demo-title">🔌 简洁图标总体架构电路板系统演示</h1>
                <p style="color: #e0e0e0; font-size: 12px;">所有节点始终显示 • 简洁图标 • 密集电路连接图</p>
            </div>
            
            <div class="demo-content">
                <div class="circuit-board-full">
                    <canvas class="full-canvas" ref="canvas"></canvas>
                    
                    <!-- 连接线层 -->
                    <svg class="connections-layer" ref="connectionsSvg">
                        <defs>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                    </svg>
                    
                    <!-- 层级标签 -->
                    <div class="layer-label" style="top: 30px; left: 10px;">数据中枢层</div>
                    <div class="layer-label" style="top: 180px; left: 10px;">QLib核心层</div>
                    <div class="layer-label" style="top: 330px; left: 10px;">业务逻辑层</div>
                    <div class="layer-label" style="top: 480px; left: 10px;">AI策略层</div>
                    <div class="layer-label" style="top: 630px; left: 10px;">实盘交易层</div>
                    <div class="layer-label" style="top: 780px; left: 10px;">实验管理层</div>
                    <div class="layer-label" style="top: 930px; left: 10px;">前端展示层</div>
                    
                    <!-- 完整节点 - 所有节点都始终显示 -->
                    <div class="full-nodes">
                        <div 
                            v-for="node in allNodes" 
                            :key="node.id"
                            :class="['full-node', { active: node.active }]"
                            :style="{
                                left: node.x + 'px',
                                top: node.y + 'px'
                            }"
                            @click="toggleNode(node)"
                        >
                            <div class="full-node-icon">
                                {{ node.icon }}
                            </div>
                            <div class="full-node-label">{{ node.name }}</div>
                        </div>
                    </div>
                    
                    <!-- 控制面板 -->
                    <div class="preview-controls">
                        <h3>🎮 简洁架构控制</h3>
                        <button class="control-button" @click="activateWorkflow('ai-strategy')">
                            <span>🧠</span> AI策略生成
                        </button>
                        <button class="control-button" @click="activateWorkflow('traditional')">
                            <span>📈</span> 传统策略执行
                        </button>
                        <button class="control-button" @click="activateWorkflow('model-training')">
                            <span>🎓</span> 模型训练
                        </button>
                        <button class="control-button" @click="activateWorkflow('qlib-online')">
                            <span>🖥</span> QLib在线服务
                        </button>
                        <button class="control-button" @click="activateWorkflow('qlib-integration')">
                            <span>🗺</span> QLib集成管理
                        </button>
                        <button class="control-button" @click="deactivateAll">
                            <span>⏹</span> 全部停用
                        </button>
                        <button class="control-button" @click="randomActivate">
                            <span>🎲</span> 随机激活
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="demo-footer">
                <div class="status-info">
                    <div class="status-item">
                        <span>🔧</span>
                        总节点: {{ allNodes.length }}
                    </div>
                    <div class="status-item">
                        <span>🔌</span>
                        激活节点: {{ activeNodes }}
                    </div>
                    <div class="status-item">
                        <span>⚡</span>
                        活跃连接: {{ activeConnections }}
                    </div>
                    <div class="status-item">
                        <span>📊</span>
                        系统负载: {{ systemLoad }}%
                    </div>
                </div>
                <div>
                    <span style="color: #00ff88;">⚡ MyQuant 简洁图标总体架构电路板系统</span>
                </div>
            </div>
        </div>
    </div>

                activeNodes() {
                    return this.allNodes.filter(n => n.active).length;
                },
                activeConnections() {
                    return this.connections.filter(c => c.active).length;
                },
                systemLoad() {
                    const total = this.allNodes.length;
                    const active = this.activeNodes;
                    return total > 0 ? Math.round((active / total) * 100) : 0;
                }
            },
            mounted() {
                this.drawCircuitBoardBackground();
                this.generateDenseConnections();
                this.updateConnections();
            },

                    const canvas = this.$refs.canvas;
                    if (!canvas) return;
                    
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                    
                    // 绘制网格背景
                    ctx.fillStyle = '#0a0a0f';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 主网格
                    ctx.strokeStyle = '#1a1a2e';
                    ctx.lineWidth = 0.5;
                    
                    const gridSize = 40;
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    
                    for (let y = 0; y < canvas.height; y += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    
                    // 细网格
                    ctx.strokeStyle = '#0f1419';
                    ctx.lineWidth = 0.3;
                    
                    const fineGridSize = 10;
                    for (let x = 0; x < canvas.width; x += fineGridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    
                    for (let y = 0; y < canvas.height; y += fineGridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    
                    // 绘制层级分隔线
                    ctx.strokeStyle = '#0f3460';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([10, 5]);
                    
                    const layerPositions = [150, 300, 450, 600, 750, 900, 1050];
                    layerPositions.forEach(y => {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    });
                    
                    ctx.setLineDash([]);
                    
                    // 绘制装饰性连接点
                    for (let i = 0; i < 150; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        
                        ctx.fillStyle = '#1e2936';
                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#0f3460';
                        ctx.beginPath();
                        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                },
                
                generateDenseConnections() {
                    this.connections = [];
                    
                    // 生成密集的层级内连接 - 每个节点都连接到多个其他节点
                    const layers = [
                        { start: 0, end: 12 },   // 数据中枢层
                        { start: 13, end: 25 },  // QLib核心层
                        { start: 26, end: 37 },  // 业务逻辑层
                        { start: 38, end: 55 },  // AI智能策略层
                        { start: 56, end: 75 },  // 实盘交易层
                        { start: 76, end: 84 },  // 实验管理层
                        { start: 85, end: 99 }   // 前端展示层
                    ];
                    
                    layers.forEach(layer => {
                        for (let i = layer.start; i < layer.end; i++) {
                            // 每个节点连接到层内的多个其他节点
                            const connectionsPerNode = 4 + Math.floor(Math.random() * 4); // 4-7个连接
                            const possibleTargets = [];
                            
                            for (let j = layer.start; j < layer.end; j++) {
                                if (i !== j) {
                                    possibleTargets.push(j);
                                }
                            }
                            
                            // 随机选择目标节点
                            const shuffled = possibleTargets.sort(() => 0.5 - Math.random());
                            const selectedTargets = shuffled.slice(0, Math.min(connectionsPerNode, possibleTargets.length));
                            
                            selectedTargets.forEach(targetIndex => {
                                this.connections.push({
                                    id: `intra-${i}-${targetIndex}`,
                                    from: this.allNodes[i].id,
                                    to: this.allNodes[targetIndex].id,
                                    active: false
                                });
                            });
                        }
                    });
                    
                    // 生成密集的跨层连接 - 每层之间大量连接
                    for (let i = 0; i < layers.length - 1; i++) {
                        const currentLayer = layers[i];
                        const nextLayer = layers[i + 1];
                        
                        // 每个节点都连接到下一层的多个节点
                        for (let j = currentLayer.start; j < currentLayer.end; j++) {
                            const connectionsPerNode = 3 + Math.floor(Math.random() * 3); // 3-5个跨层连接
                            
                            for (let k = 0; k < connectionsPerNode; k++) {
                                const targetIndex = nextLayer.start + Math.floor(Math.random() * (nextLayer.end - nextLayer.start));
                                
                                this.connections.push({
                                    id: `cross-${i}-${j}-${k}`,
                                    from: this.allNodes[j].id,
                                    to: this.allNodes[targetIndex].id,
                                    active: false
                                });
                            }
                        }
                    }
                    
                    // 添加一些特殊的跨层级连接（跳层连接）
                    for (let i = 0; i < layers.length - 2; i++) {
                        const currentLayer = layers[i];
                        const targetLayer = layers[i + 2];
                        
                        // 每层有几个节点连接到跳层
                        const skipConnections = 4 + Math.floor(Math.random() * 3); // 4-6个跳层连接
                        
                        for (let j = 0; j < skipConnections; j++) {
                            const fromIndex = currentLayer.start + Math.floor(Math.random() * (currentLayer.end - currentLayer.start));
                            const toIndex = targetLayer.start + Math.floor(Math.random() * (targetLayer.end - targetLayer.start));
                            
                            this.connections.push({
                                id: `skip-${i}-${j}`,
                                from: this.allNodes[fromIndex].id,
                                to: this.allNodes[toIndex].id,
                                active: false
                            });
                        }
                    }
                },
                
                updateConnections() {
                    const svg = this.$refs.connectionsSvg;
                    if (!svg) return;
                    
                    // 清除现有连接线
                    const existingLines = svg.querySelectorAll('path');
                    existingLines.forEach(line => line.remove());
                    
                    // 绘制连接线
                    this.connections.forEach(conn => {
                        const fromNode = this.allNodes.find(n => n.id === conn.from);
                        const toNode = this.allNodes.find(n => n.id === conn.to);
                        
                        if (fromNode && toNode) {
                            const fromX = fromNode.x + 40;
                            const fromY = fromNode.y + 30;
                            const toX = toNode.x + 40;
                            const toY = toNode.y + 30;
                            
                            // 检查连接是否活跃
                            conn.active = fromNode.active && toNode.active;
                            
                            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            const midX = (fromX + toX) / 2;
                            const midY = (fromY + toY) / 2;
                            
                            path.setAttribute('d', `M ${fromX} ${fromY} Q ${midX} ${fromY}, ${midX} ${midY} T ${toX} ${toY}`);
                            path.setAttribute('class', `connection-line ${conn.active ? 'active' : ''}`);
                            path.setAttribute('filter', conn.active ? 'url(#glow)' : '');
                            
                            svg.appendChild(path);
                        }
                    });
                },
                
                toggleNode(node) {
                    node.active = !node.active;
                    this.updateConnections();
                },
                
                activateWorkflow(workflow) {
                    this.deactivateAll();
                    
                    const workflows = {
                        'ai-strategy': [
                            'DH1', 'DH2', 'DH3', 'DH4', 'DH5', 'DH6', 'DH7', 'DH8',
                            'DP1', 'DP2', 'DP3', 'DP4',
                            'QL1', 'QL2', 'QL8', 'QL9',
                            'BL1', 'BL2', 'AN1', 'AN2', 'AN4',
                            'AI1', 'AI2', 'AI3', 'AI4', 'AI5', 'AI6', 'AI7', 'AI8', 'AI9', 'AI10', 'AI11', 'AI12',
                            'ML1', 'ML2', 'ML3', 'OL1', 'MI1', 'AA1'
                        ],
                        'traditional': [
                            'DH1', 'DH2', 'DH4', 'DH5', 'DH7',
                            'QL1', 'QL2', 'QL3', 'QL4', 'QL5', 'QL6', 'QL7', 'QL8', 'QL9', 'QL10',
                            'AB1', 'BA1',
                            'BL1', 'BL2', 'BL3', 'BL4', 'BL5', 'BL6', 'BL7', 'BL8',
                            'AN1', 'AN2', 'AN3', 'AN4'
                        ],
                        'model-training': [
                            'DH1', 'DH2', 'DH3', 'DH4', 'DH6', 'DH7',
                            'DP1', 'DP2', 'DP3', 'DP4',
                            'QL1', 'QL2', 'QL8', 'QL9',
                            'BL1', 'BL2', 'AN1', 'AN4',
                            'AI1', 'AI3', 'AI4', 'AI6', 'AI10', 'AI11', 'AI12',
                            'ML1', 'ML2', 'ML3', 'MI1'
                        ],
                        'qlib-online': [
                            'DH1', 'DH2', 'DH6',
                            'QL1', 'QL2', 'QL6', 'QL8', 'QL9',
                            'BL1', 'BL2',
                            'EM1', 'EM2', 'EM3', 'EM4', 'EM5', 'EM6', 'EM7', 'EM8',
                            'AU1',
                            'AI2', 'AI8'
                        ],
                        'qlib-integration': [
                            'DH1', 'DH2', 'DH3', 'DH4', 'DH5', 'DH6', 'DH7', 'DH8',
                            'QL1', 'QL2', 'QL3', 'QL4', 'QL5', 'QL6', 'QL7', 'QL8', 'QL9', 'QL10',
                            'AB1', 'BA1',
                            'EM1', 'EM2', 'EM3', 'EM4', 'EM5', 'EM6', 'EM7', 'EM8',
                            'AU1',
                            'UI1', 'UI2', 'UI3', 'UI4', 'UI5', 'UI6', 'UI7', 'UI8',
                            'SYS1', 'SYS2', 'SYS3', 'ME1', 'PF1', 'UT1'
                        ]
                    };
                    
                    const nodesToActivate = workflows[workflow] || [];
                    
                    // 逐个激活节点，创建动画效果
                    nodesToActivate.forEach((nodeId, index) => {
                        setTimeout(() => {
                            const node = this.allNodes.find(n => n.id === nodeId);
                            if (node) {
                                node.active = true;
                                this.updateConnections();
                            }
                        }, index * 100);
                    });
                },
                
                deactivateAll() {
                    this.allNodes.forEach(node => {
                        node.active = false;
                    });
                    this.updateConnections();
                },
                
                randomActivate() {
                    this.deactivateAll();
                    const numToActivate = Math.floor(Math.random() * 30) + 15;
                    const shuffled = [...this.allNodes].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, numToActivate);
                    
                    selected.forEach((node, index) => {
                        setTimeout(() => {
                            node.active = true;
                            this.updateConnections();
                        }, index * 50);
                    });
                }
            },
            watch: {
                allNodes: {
                    handler() {
                        this.updateConnections();
                    },
                    deep: true
                }
            }
        }).mount('#app');
    </script>
</body>
