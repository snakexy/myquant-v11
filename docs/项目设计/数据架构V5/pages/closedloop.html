        <h1>🔄 数据闭环与持久化</h1>
        <div class="info-box">
            <h2>数据闭环流程</h2>
            <p><strong>在线获取</strong> → <strong>中间存储(.day/.pkl)</strong> → <strong>格式转换</strong> → <strong>QLib主数据库</strong> → <strong>缓存更新</strong></p>
            <p><strong>目标</strong>: 确保数据可用性、一致性、时效性</p>
        </div>
        <h2>增量更新服务 (IncrementalService)</h2>
        <p><strong>功能</strong>: 填补缺失的交易日数据、在线获取最新数据</p>
        <p><strong>数据源</strong>: XtQuant(交易) → PyTdx2</p>
        <h2>刷新策略</h2>
        <ul>
            <li><strong>L0/L1</strong>: 实时推送/5秒轮询，TTL 60秒</li>
            <li><strong>L2/L3</strong>: 盘后增量更新当日数据</li>
            <li><strong>L5 板块</strong>: 交易时间30分钟更新</li>
        </ul>
        <p style="text-align: center; color: #64748b; margin-top: 50px;">文档版本: v3.2 | 更新日期: 2026-03-20</p>
